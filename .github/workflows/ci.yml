name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: dictionary
          POSTGRES_USER: dictionary
          POSTGRES_PASSWORD: dictionary
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dictionary -d dictionary"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dictionary:dictionary@localhost:5432/dictionary?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: continuous-integration-secret-at-least-32-characters
      JWT_ISSUER: english-dictionary-api
      JWT_AUDIENCE: english-dictionary-client
      JWT_EXPIRES_IN: 1h
      CORS_ORIGINS: http://localhost:3000
      DICTIONARY_API_URL: https://api.dictionaryapi.dev
      CACHE_LIST_TTL_SECONDS: 300
      CACHE_DETAIL_TTL_SECONDS: 86400
      FAVORITE_JOB_TIMEOUT_MS: 10000
      FAVORITE_WORKER_CONCURRENCY: 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:deploy
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
